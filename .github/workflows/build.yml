name: Build and Deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Build Plugins
        run: |
          # 1. Esegui la compilazione
          gradle make --stacktrace
          
          # 2. Crea la cartella 'builds' che serve alla Action finale
          mkdir -p builds
          
          # 3. Cerca i file .cst e plugins.json generati e copiali in 'builds'
          # Usiamo 'find' perché Gradle li genera nelle sottocartelle build/
          find . -name "*.cst" -exec cp {} builds/ \;
          find . -name "plugins.json" -exec cp {} builds/ \;
          
          # 4. Verifica per il log che i file siano lì
          ls -R builds/

      - name: Push to builds branch
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: builds
          FOLDER: builds
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
