name: Build and Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Plugins
        run: |
          chmod +x gradlew
          ./gradlew make --stacktrace

      - name: Push to builds branch
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: builds # Ramo dove verranno salvati i plugin pronti
          FOLDER: builds # Cartella creata da Gradle
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
