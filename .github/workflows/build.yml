name: Build and Deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Usiamo il comando 'gradle' direttamente invece di './gradlew'
      - name: Build Plugins
        run: gradle make --stacktrace

      - name: Push to builds branch
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: builds
          FOLDER: builds
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
